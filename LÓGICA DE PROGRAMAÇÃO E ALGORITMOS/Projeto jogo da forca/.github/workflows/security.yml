name: Security Scan - Jogo da forca
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    #impede que suba senhas ou chaves de API sem querer
    
    - name: Gitleaks Scan
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

    #Procura funções perigosas no Python

    - name: Bandit Scan (SAST)
      run: |
        pip install bandit
        bandit -r . -ll


